name: Build DMG (macOS 26.4 Optimized)

on:
  push:
    branches: [ master ]
  workflow_dispatch:

env:
  # 强制使用较新的 Node 版本以避免 GitHub Actions 警告
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    # 使用最新的 macOS 环境（通常包含最新版 Xcode）
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive # 如果项目有子模块，确保一并拉取

      - name: Build Later.app
        run: |
          # 创建编译输出目录
          mkdir -p build_output
          
          xcodebuild \
            -project xcode/Later.xcodeproj \
            -scheme Test \
            -configuration Release \
            -derivedDataPath ./DerivedData \
            -destination "platform=macOS" \
            ARCHS="arm64 x86_64" \
            ONLY_ACTIVE_ARCH=NO \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            clean build

      - name: Create DMG
        run: |
          # 动态定位编译好的 .app 路径（防止路径写死导致找不到文件）
          APP_PATH=$(find ./DerivedData -name "Later.app" -type d | head -n 1)
          
          if [ -z "$APP_PATH" ]; then
            echo "错误: 未能找到编译生成的 Later.app"
            exit 1
          fi
          
          echo "找到路径: $APP_PATH"
          
          DMG_DIR="dmg_staging"
          DMG_OUT="Later_M4_Universal.dmg"

          mkdir -p "$DMG_DIR"
          cp -r "$APP_PATH" "$DMG_DIR/"
          # 创建 Applications 软链接，方便用户安装
          ln -s /Applications "$DMG_DIR/Applications"

          hdiutil create \
            -srcfolder "$DMG_DIR" \
            -volname "Later Launchpad" \
            -format UDZO \
            -o "$DMG_OUT"

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: Later-Installer
          path: "*.dmg"
