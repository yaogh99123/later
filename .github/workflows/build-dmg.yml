name: Build DMG (Auto-Scheme Detection)

on:
  push:
    branches: [ master ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Detect Scheme and Build
        run: |
          # 1. 自动获取项目中的第一个有效 Scheme 名
          # 使用 xcodebuild -list 命令并解析输出
          SCHEME_NAME=$(xcodebuild -list -project xcode/Later.xcodeproj | awk '/Schemes:/{flag=1;next} flag{print $1;exit}' | tr -d '[:space:]')
          
          if [ -z "$SCHEME_NAME" ]; then
            echo "错误: 在 xcode/Later.xcodeproj 中找不到任何 Scheme！"
            exit 1
          fi
          
          echo "检测到 Scheme: $SCHEME_NAME，开始编译..."

          # 2. 执行编译
          xcodebuild \
            -project xcode/Later.xcodeproj \
            -scheme "$SCHEME_NAME" \
            -configuration Release \
            -derivedDataPath ./DerivedData \
            -destination "platform=macOS" \
            ARCHS="arm64 x86_64" \
            ONLY_ACTIVE_ARCH=NO \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            clean build

      - name: Create DMG
        run: |
          # 动态寻找编译出的 .app 文件
          APP_PATH=$(find ./DerivedData -name "*.app" -type d | head -n 1)
          
          if [ -z "$APP_PATH" ]; then
            echo "错误: 未能在 DerivedData 中找到编译生成的 .app"
            exit 1
          fi
          
          APP_NAME=$(basename "$APP_PATH")
          echo "正在为 $APP_NAME 打包..."
          
          DMG_DIR="dmg_staging"
          DMG_OUT="Later_Universal.dmg"

          mkdir -p "$DMG_DIR"
          cp -r "$APP_PATH" "$DMG_DIR/"
          ln -s /Applications "$DMG_DIR/Applications"

          hdiutil create \
            -srcfolder "$DMG_DIR" \
            -volname "Later Installer" \
            -format UDZO \
            -o "$DMG_OUT"

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: Later-App-Installer
          path: "*.dmg"
